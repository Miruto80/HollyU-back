# version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: HollyU_db
    environment:
      POSTGRES_DB: Hallalo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: